<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lead Capture - Part C</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        .error { color: red; font-size: 12px; display: none; }
        textarea { width: 100%; }
    </style>
</head>
<body>

    <form id="leadForm">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" required>
            <div class="error" id="nameError">Name is required</div>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Country:</label>
            <select id="country">
                <option value="India">India</option>
                <option value="USA">USA</option>
            </select>
        </div>
        <div class="form-group">
            <label>Course Level:</label>
            <input type="radio" name="level" value="UG" checked> UG
            <input type="radio" name="level" value="Postgraduate"> PG
            <input type="radio" name="level" value="PhD"> PhD
        </div>
        <div class="form-group">
            <label>Preferred University:</label>
            <input type="text" id="university" required>
        </div>
        <div class="form-group">
            <label>Message:</label>
            <textarea id="message" maxlength="300"></textarea>
            <p><span id="charCount">0</span>/300</p>
        </div>
        <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="thankYou" style="display:none;">Thank you for your submission!</div>

    <script>
        const form = document.getElementById('leadForm');
        const msg = document.getElementById('message');
        const charCount = document.getElementById('charCount');

        msg.addEventListener('input', () => charCount.innerText = msg.value.length);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                country: document.getElementById('country').value,
                course_level: document.querySelector('input[name="level"]:checked').value,
                university: document.getElementById('university').value,
                message: msg.value
            };

            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const response = await fetch('http://localhost:5678/webhook-test/c6aadd2b-f6cd-445a-bbe3-408954cb5262', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    form.style.display = 'none';
                    document.getElementById('thankYou').style.display = 'block';
                }
            } catch (err) {
                alert("Submission failed!");
                btn.disabled = false;
                btn.innerText = "Submit";
            }
        });
    </script>
</body>
</html>
