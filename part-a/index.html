<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lead Capture</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .error {
            color: red;
            font-size: 12px;
            display: none;
        }

        textarea {
            width: 100%;
        }
    </style>
</head>

<body>

    <form id="leadForm">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" required>
            <div class="error" id="nameError">Name is required</div>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
            <div class="error" id="emailError">Valid email required</div>
        </div>

        <div class="form-group">
            <label>Country:</label>
            <select id="country">
                <option value="India">India</option>
                <option value="USA">USA</option>
            </select>
        </div>

        <div class="form-group">
            <label>Course Level:</label>
            <input type="radio" name="level" value="UG" checked> UG
            <input type="radio" name="level" value="Postgraduate"> PG
            <input type="radio" name="level" value="PhD"> PhD
        </div>

        <div class="form-group">
            <label>Preferred University:</label>
            <input type="text" id="university" required>
        </div>

        <div class="form-group">
            <label>Message (Max 300 chars):</label>
            <textarea id="message" maxlength="300"></textarea>
            <p><span id="charCount">0</span>/300</p>
        </div>

        <button type="submit">Submit</button>
    </form>

    <div id="thankYou" style="display:none;">Thank you for your submission!</div>

    <script>
        const form = document.getElementById('leadForm');
        const msg = document.getElementById('message');
        const charCount = document.getElementById('charCount');

        // Live character counter [cite: 12]
        msg.addEventListener('input', () => {
            charCount.innerText = msg.value.length;
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Stop page reload 

            // Basic validation logic 
            const name = document.getElementById('name').value;
            if (name === "") {
                document.getElementById('nameError').style.display = 'block';
                return;
            }

            const formData = {
                name: name,
                email: document.getElementById('email').value,
                course_level: document.querySelector('input[name="level"]:checked').value,
                message: msg.value
            };

            console.log(JSON.stringify(formData)); // Log to console 
            form.style.display = 'none';
            document.getElementById('thankYou').style.display = 'block';
        });
    </script>
</body>

</html>
